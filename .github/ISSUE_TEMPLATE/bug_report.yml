name: "Bug Report"
title: "[Bug]: "
description: "Create a bug report if you find any issues in this repository"
labels: ["status:waiting", "type:bug"]
assignees: ["brycekwon"]
body:
  - type: textarea
    id: bug_description
    attributes:
      label: Bug Description
      description: Provide a clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: bug_replication
    attributes:
      label: Steps to Reproduce
      description: Provide the steps needed to reproduce the behavior.
    validations:
      required: true
  - type: textarea
    id: additional_context
    attributes:
      label: Additional Context
      description: Provide any relevant screenshots, logs, or other context.
    validations:
      required: false
